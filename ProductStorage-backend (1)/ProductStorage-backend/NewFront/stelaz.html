<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стеллажи - StoreMarket</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFF7D9 0%, #F7C48F 100%);
            min-height: 100vh;
            color: #5a4a42;
        }

        .container {
            width: 100%;
            height: 80px;
            background: #F7C48F;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid rgba(222, 193, 150, 0.5);
            box-shadow: 0 2px 10px rgba(247, 196, 143, 0.3);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #5a4a42;
            text-decoration: none;
        }

        .admin-content {
            padding: 50px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .admin-title {
            font-size: 3rem;
            font-weight: 700;
            color: #5a4a42;
            margin-bottom: 15px;
        }

        .admin-subtitle {
            font-size: 1.2rem;
            color: #7a6a52;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .shelves-table-container {
            background: rgba(255, 253, 248, 0.95);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(247, 196, 143, 0.3);
            box-shadow: 0 5px 15px rgba(247, 196, 143, 0.2);
            margin-top: 30px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .table-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #5a4a42;
        }

        .add-shelf-btn {
            background: #F7C48F;
            color: #5a4a42;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(222, 193, 150, 0.5);
        }

        .add-shelf-btn:hover {
            background: #e8b47a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 196, 143, 0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(247, 196, 143, 0.1);
        }

        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(247, 196, 143, 0.3);
        }

        th {
            background: #F7C48F;
            color: #5a4a42;
            font-weight: 600;
            font-size: 0.95rem;
        }

        tr:hover {
            background: rgba(247, 196, 143, 0.1);
        }

        .id-column {
            width: 80px;
            font-weight: 600;
            color: #7a6a52;
        }

        .name-column {
            width: 200px;
        }

        .capacity-column {
            width: 150px;
        }

        .used-column {
            width: 150px;
        }

        .actions-column {
            width: 180px;
            text-align: center;
        }

        .editable-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #F7C48F;
            border-radius: 4px;
            font-size: 0.9rem;
            background: rgba(247, 196, 143, 0.1);
            color: #5a4a42;
        }

        .editable-input:focus {
            outline: none;
            border-color: #e8b47a;
            box-shadow: 0 0 5px rgba(247, 196, 143, 0.5);
            background: white;
        }

        .capacity-input {
            width: 80px;
            padding: 5px 8px;
            border: 1px solid #F7C48F;
            border-radius: 4px;
            text-align: center;
            font-size: 0.9rem;
        }

        .capacity-input:focus {
            outline: none;
            border-color: #e8b47a;
            box-shadow: 0 0 5px rgba(247, 196, 143, 0.5);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-low { background: #4CAF50; }
        .progress-medium { background: #FF9800; }
        .progress-high { background: #f44336; }

        .action-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn-save, .btn-delete {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-save {
            background: #4CAF50;
            color: white;
        }

        .btn-save:hover {
            background: #45a049;
            transform: translateY(-1px);
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background: #da190b;
            transform: translateY(-1px);
        }

        /* Стили для формы добавления */
        .add-form {
            background: rgba(247, 196, 143, 0.1);
            border: 2px dashed #F7C48F;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: end;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #5a4a42;
        }

        .form-actions {
            display: flex;
            gap: 10px;
        }

        .btn-add {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-add:hover {
            background: #45a049;
        }

        .btn-cancel {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-cancel:hover {
            background: #7f8c8d;
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        .success-message {
            background: rgba(46, 204, 113, 0.2);
            color: #27ae60;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .error-message {
            background: rgba(231, 76, 60, 0.2);
            color: #c0392b;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .warning-message {
            background: rgba(241, 196, 15, 0.2);
            color: #f39c12;
            border: 1px solid rgba(241, 196, 15, 0.3);
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #7a6a52;
            font-style: italic;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .low-stock-warning {
            background: rgba(241, 196, 15, 0.1);
            border-left: 4px solid #f39c12;
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .low-stock-warning .icon {
            font-size: 1.2rem;
            color: #f39c12;
        }

        .low-stock-warning .message-text {
            flex: 1;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .admin-title {
                font-size: 2.5rem;
            }

            .container {
                padding: 0 20px;
            }

            .table-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            th, td {
                padding: 10px 15px;
            }

            .action-btns {
                flex-direction: column;
                gap: 5px;
            }

            .form-row {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-section">
            <a href="adminok.html" class="logo">StoreMarket</a>
        </div>
    </div>

    <main class="admin-content">
        <div class="admin-header">
            <h1 class="admin-title">Управление стеллажами</h1>
            <p class="admin-subtitle">Настройка вместимости и управление системой хранения товаров</p>
        </div>

        <!-- Сообщения -->
        <div id="messageContainer"></div>

        <!-- Предупреждения о низком остатке -->
        <div id="lowStockWarnings"></div>

        <div class="shelves-table-container">
            <div class="table-header">
                <h2 class="table-title">Система стеллажей</h2>
                <button class="add-shelf-btn" id="showAddForm">+ Добавить стеллаж</button>
            </div>

            <!-- Форма добавления нового стеллажа -->
            <div class="add-form" id="addForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="newShelfName">Название стеллажа</label>
                        <input type="text" id="newShelfName" class="editable-input" placeholder="Стеллаж A-1" required>
                    </div>
                    <div class="form-group">
                        <label for="newCapacity">Вместимость</label>
                        <input type="number" id="newCapacity" class="capacity-input" value="100" min="1" max="1000" required>
                    </div>
                    <div class="form-group">
                        <label for="newUsed">Использовано</label>
                        <input type="number" id="newUsed" class="capacity-input" value="0" min="0" max="1000" required>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn-add" id="addShelfBtn">Добавить</button>
                    <button class="btn-cancel" id="hideAddForm">Отмена</button>
                </div>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th class="id-column">ID</th>
                        <th class="name-column">Название стеллажа</th>
                        <th class="capacity-column">Вместимость</th>
                        <th class="used-column">Использовано</th>
                        <th class="actions-column">Действия</th>
                    </tr>
                </thead>
                <tbody id="shelvesTableBody">
                    <!-- Данные будут загружены через JavaScript -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const API_BASE_URL = 'http://localhost:8000';

        // Элементы DOM
        const shelvesTableBody = document.getElementById('shelvesTableBody');
        const addForm = document.getElementById('addForm');
        const showAddFormBtn = document.getElementById('showAddForm');
        const hideAddFormBtn = document.getElementById('hideAddForm');
        const addShelfBtn = document.getElementById('addShelfBtn');
        const messageContainer = document.getElementById('messageContainer');
        const lowStockWarnings = document.getElementById('lowStockWarnings');

        // Загрузка стеллажей при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Загрузка страницы...');
            loadShelves();
        });

        // Показать/скрыть форму добавления
        showAddFormBtn.addEventListener('click', () => {
            addForm.style.display = 'block';
            document.getElementById('newShelfName').focus();
        });

        hideAddFormBtn.addEventListener('click', () => {
            addForm.style.display = 'none';
            resetAddForm();
        });

        // Обработка добавления стеллажа
        addShelfBtn.addEventListener('click', async () => {
            const name = document.getElementById('newShelfName').value.trim();
            const max_capacity = parseInt(document.getElementById('newCapacity').value);
            const current_quantity = parseInt(document.getElementById('newUsed').value);

            if (!name || isNaN(max_capacity) || isNaN(current_quantity)) {
                showMessage('Пожалуйста, заполните все поля корректно', 'error');
                return;
            }

            if (current_quantity > max_capacity) {
                showMessage('Текущее количество не может превышать вместимость', 'error');
                return;
            }

            try {
                const shelfData = { 
                    name, 
                    max_capacity, 
                    current_quantity,
                    location: "",
                    description: "",
                    category_id: null
                };
                
                console.log('Отправка данных:', shelfData);
                
                await createShelf(shelfData);
                showMessage('Стеллаж успешно создан', 'success');

                // Перезагружаем список стеллажей
                await loadShelves();
                
                // Скрываем форму и сбрасываем
                addForm.style.display = 'none';
                resetAddForm();

            } catch (error) {
                console.error('Ошибка при создании стеллажа:', error);
                showMessage('Ошибка при создании стеллажа: ' + error.message, 'error');
            }
        });

        // Функция загрузки стеллажей
        async function loadShelves() {
            try {
                shelvesTableBody.innerHTML = '<tr><td colspan="5" class="empty-message">Загрузка...</td></tr>';
                
                console.log('Запрос стеллажей...');
                const shelves = await getShelves();
                
                if (!shelves || shelves.length === 0) {
                    shelvesTableBody.innerHTML = '<tr><td colspan="5" class="empty-message">Стеллажи не найдены</td></tr>';
                    return;
                }

                console.log('Получено стеллажей:', shelves.length);
                
                shelvesTableBody.innerHTML = '';
                shelves.forEach(shelf => {
                    const row = createShelfRow(shelf);
                    shelvesTableBody.appendChild(row);
                });

                // Проверяем остатки товаров
                checkLowStock(shelves);

            } catch (error) {
                console.error('Ошибка при загрузке стеллажей:', error);
                shelvesTableBody.innerHTML = '<tr><td colspan="5" class="empty-message">Ошибка при загрузке стеллажей: ' + error.message + '</td></tr>';
            }
        }

        // Проверка низких остатков товаров
        function checkLowStock(shelves) {
            lowStockWarnings.innerHTML = '';
            const LOW_STOCK_THRESHOLD = 0.1; // 10% от вместимости

            shelves.forEach(shelf => {
                const remainingSpace = shelf.max_capacity - shelf.current_quantity;
                const recommendedMin = Math.floor(shelf.max_capacity * LOW_STOCK_THRESHOLD);
                
                if (remainingSpace <= recommendedMin && remainingSpace > 0) {
                    const warning = document.createElement('div');
                    warning.className = 'low-stock-warning';
                    warning.innerHTML = `
                        <div class="icon">⚠️</div>
                        <div class="message-text">
                            <strong>${shelf.name}</strong>: осталось мало места! Свободно ${remainingSpace} из ${shelf.max_capacity} мест (меньше 10% от вместимости)
                        </div>
                    `;
                    lowStockWarnings.appendChild(warning);
                }
            });
        }

        // Создание строки стеллажа
        function createShelfRow(shelf) {
            const percentage = shelf.max_capacity > 0 ? Math.min((shelf.current_quantity / shelf.max_capacity) * 100, 100) : 0;
            let progressClass = 'progress-low';
            if (percentage >= 90) progressClass = 'progress-high';
            else if (percentage >= 50) progressClass = 'progress-medium';

            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="id-column">${shelf.id}</td>
                <td class="name-column">
                    <input type="text" class="editable-input" value="${shelf.name || ''}" data-field="name">
                </td>
                <td class="capacity-column">
                    <input type="number" class="capacity-input" value="${shelf.max_capacity || 0}" min="1" max="1000" data-field="max_capacity">
                </td>
                <td class="used-column">
                    <div>
                        <input type="number" class="capacity-input" value="${shelf.current_quantity || 0}" min="0" max="1000" data-field="current_quantity">
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${progressClass}" style="width: ${percentage}%"></div>
                    </div>
                </td>
                <td class="actions-column">
                    <div class="action-btns">
                        <button class="btn-save" onclick="saveShelf(${shelf.id}, this)">Сохранить</button>
                        <button class="btn-delete" onclick="deleteShelf(${shelf.id})">Удалить</button>
                    </div>
                </td>
            `;
            return row;
        }

        // Сохранение стеллажа (редактирование)
        async function saveShelf(shelfId, button) {
            const row = button.closest('tr');
            const nameInput = row.querySelector('input[data-field="name"]');
            const capacityInput = row.querySelector('input[data-field="max_capacity"]');
            const quantityInput = row.querySelector('input[data-field="current_quantity"]');
            
            const shelfData = {
                name: nameInput.value.trim(),
                max_capacity: parseInt(capacityInput.value),
                current_quantity: parseInt(quantityInput.value),
                location: "",
                description: "",
                category_id: null
            };

            // Валидация
            if (!shelfData.name || isNaN(shelfData.max_capacity) || isNaN(shelfData.current_quantity)) {
                showMessage('Пожалуйста, заполните все поля корректно', 'error');
                return;
            }

            if (shelfData.current_quantity > shelfData.max_capacity) {
                showMessage('Текущее количество не может превышать вместимость', 'error');
                return;
            }

            try {
                button.textContent = 'Сохранение...';
                button.disabled = true;
                
                await updateShelf(shelfId, shelfData);
                showMessage('Стеллаж успешно обновлен', 'success');
                
                // Обновляем прогресс-бар
                updateProgressBar(row, shelfData.current_quantity, shelfData.max_capacity);
                
                // Перезагружаем список для проверки остатков
                await loadShelves();
                
            } catch (error) {
                console.error('Ошибка при обновлении стеллажа:', error);
                showMessage('Ошибка при обновлении стеллажа: ' + error.message, 'error');
            } finally {
                button.textContent = 'Сохранить';
                button.disabled = false;
            }
        }

        // Обновление прогресс-бара
        function updateProgressBar(row, current_quantity, max_capacity) {
            const percentage = max_capacity > 0 ? Math.min((current_quantity / max_capacity) * 100, 100) : 0;
            let progressClass = 'progress-low';
            if (percentage >= 90) progressClass = 'progress-high';
            else if (percentage >= 50) progressClass = 'progress-medium';

            const progressFill = row.querySelector('.progress-fill');
            progressFill.className = `progress-fill ${progressClass}`;
            progressFill.style.width = `${percentage}%`;
        }

        // Удаление стеллажа
        async function deleteShelf(shelfId) {
            if (!confirm('Вы уверены, что хотите удалить этот стеллаж?')) {
                return;
            }

            try {
                await deleteShelfRequest(shelfId);
                showMessage('Стеллаж успешно удален', 'success');
                await loadShelves(); // Перезагружаем список
            } catch (error) {
                console.error('Ошибка при удалении стеллажа:', error);
                showMessage('Ошибка при удалении стеллажа: ' + error.message, 'error');
            }
        }

        // Сброс формы добавления
        function resetAddForm() {
            document.getElementById('newShelfName').value = '';
            document.getElementById('newCapacity').value = '100';
            document.getElementById('newUsed').value = '0';
        }

        // API функции с улучшенной обработкой ошибок

        // Получить все стеллажи
        async function getShelves() {
            try {
                console.log(`Запрос на ${API_BASE_URL}/shelves`);
                
                const response = await fetch(`${API_BASE_URL}/shelves`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    mode: 'cors'
                });
                
                console.log('Статус ответа:', response.status, response.statusText);
                
                if (!response.ok) {
                    let errorText = await response.text();
                    console.error('Текст ошибки:', errorText);
                    
                    try {
                        const errorJson = JSON.parse(errorText);
                        errorText = errorJson.detail || errorText;
                    } catch (e) {
                        // Не JSON ответ
                    }
                    
                    throw new Error(`HTTP ${response.status}: ${errorText || 'Ошибка при получении стеллажей'}`);
                }
                
                const data = await response.json();
                console.log('Получены данные:', data);
                return data;
                
            } catch (error) {
                console.error('Сетевая ошибка при получении стеллажей:', error);
                throw new Error(`Сетевая ошибка: ${error.message}`);
            }
        }

        // Создать стеллаж
        async function createShelf(shelfData) {
            try {
                console.log('Отправка POST запроса:', shelfData);
                
                const response = await fetch(`${API_BASE_URL}/shelves`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(shelfData),
                    mode: 'cors'
                });
                
                console.log('Статус ответа:', response.status);
                
                if (!response.ok) {
                    let errorDetail = 'Ошибка при создании стеллажа';
                    try {
                        const errorData = await response.json();
                        errorDetail = errorData.detail || errorDetail;
                    } catch (e) {
                        const errorText = await response.text();
                        console.error('Текст ошибки:', errorText);
                        errorDetail = errorText || errorDetail;
                    }
                    throw new Error(errorDetail);
                }
                
                return await response.json();
            } catch (error) {
                console.error('Сетевая ошибка при создании стеллажа:', error);
                throw error;
            }
        }

        // Обновить стеллаж
        async function updateShelf(shelfId, shelfData) {
            try {
                const response = await fetch(`${API_BASE_URL}/shelves/${shelfId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(shelfData),
                    mode: 'cors'
                });
                
                if (!response.ok) {
                    let errorDetail = 'Ошибка при обновлении стеллажа';
                    try {
                        const errorData = await response.json();
                        errorDetail = errorData.detail || errorDetail;
                    } catch (e) {
                        const errorText = await response.text();
                        errorDetail = errorText || errorDetail;
                    }
                    throw new Error(errorDetail);
                }
                
                return await response.json();
            } catch (error) {
                console.error('Сетевая ошибка при обновлении стеллажа:', error);
                throw error;
            }
        }

        // Удалить стеллаж
        async function deleteShelfRequest(shelfId) {
            try {
                const response = await fetch(`${API_BASE_URL}/shelves/${shelfId}`, {
                    method: 'DELETE',
                    headers: {
                        'Accept': 'application/json'
                    },
                    mode: 'cors'
                });
                
                if (!response.ok) {
                    let errorDetail = 'Ошибка при удалении стеллажа';
                    try {
                        const errorData = await response.json();
                        errorDetail = errorData.detail || errorDetail;
                    } catch (e) {
                        const errorText = await response.text();
                        errorDetail = errorText || errorDetail;
                    }
                    throw new Error(errorDetail);
                }
                
                return await response.json();
            } catch (error) {
                console.error('Сетевая ошибка при удалении стеллажа:', error);
                throw error;
            }
        }

        // Функция для показа сообщений
        function showMessage(message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            messageDiv.textContent = message;
            
            messageContainer.innerHTML = '';
            messageContainer.appendChild(messageDiv);
            
            // Автоматически скрыть сообщение через 5 секунд
            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        // Проверка авторизации администратора
        function checkAdminAuth() {
            const adminData = localStorage.getItem('admin');
            if (!adminData) {
                window.location.href = 'admin.html';
                return null;
            }
            return JSON.parse(adminData);
        }

        // Проверяем авторизацию при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            const admin = checkAdminAuth();
            if (!admin) {
                return;
            }
        });
    </script>
</body>
</html>
