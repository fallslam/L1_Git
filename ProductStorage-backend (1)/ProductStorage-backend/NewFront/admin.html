<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
    <meta charset="utf-8">
    <title>Вход для администратора</title>
    <style>
        /* Ваши существующие стили остаются без изменений */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
          --cream: #FFF7D9;
          --peach: #F7C48F;
          --soft-green: #001800;
          --soft-red: #FFB6C1;
          --soft-blue: #ff0000;
          --soft-purple: #D8BFD8;
          --text-dark: #8B7355;
          --text-light: #FFF7D9;
          --shadow-soft: 0 8px 32px rgba(247, 196, 143, 0.2);
          --border-radius: 20px;
          --orange-primary: #FF6B35;
          --orange-secondary: #FF8E53;
          --orange-dark: #E55A2B;
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: 'Poppins', sans-serif;
        }

        body {
          min-height: 100vh;
          background: linear-gradient(135deg, var(--cream) 0%, var(--peach) 100%);
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 20px;
        }

        .center {
          display: flex;
          justify-content: center;
          align-items: center;
          width: 100%;
        }

        .container {
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(20px);
          border-radius: var(--border-radius);
          box-shadow: var(--shadow-soft);
          padding: 50px 40px;
          width: 100%;
          max-width: 450px;
          border: 1px solid rgba(255, 255, 255, 0.3);
          position: relative;
        }

        .container::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 5px;
          background: linear-gradient(90deg, var(--orange-primary), var(--orange-secondary), #FFA500, #FF8C00);
          border-radius: var(--border-radius) var(--border-radius) 0 0;
        }

        .back-arrow {
          position: absolute;
          top: 20px;
          left: 20px;
          background: linear-gradient(135deg, var(--orange-primary), var(--orange-secondary));
          width: 40px;
          height: 40px;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          text-decoration: none;
          color: white;
          font-size: 20px;
          box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
          transition: all 0.3s ease;
          z-index: 10;
        }

        .back-arrow:hover {
          transform: translateY(-2px) scale(1.1);
          box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
          background: linear-gradient(135deg, var(--orange-dark), var(--orange-primary));
        }

        .text {
          font-size: 38px;
          font-weight: 700;
          text-align: center;
          background: linear-gradient(135deg, var(--orange-primary), var(--orange-secondary));
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          margin-bottom: 10px;
          margin-top: 10px;
        }

        form {
          margin-top: 30px;
        }

        form .data {
          margin: 20px 0;
        }

        form .data label {
          font-size: 15px;
          font-weight: 500;
          color: var(--text-dark);
          margin-bottom: 8px;
          display: block;
        }

        form .data input {
          height: 55px;
          width: 100%;
          padding: 0 20px;
          font-size: 16px;
          border: 2px solid rgba(247, 196, 143, 0.3);
          border-radius: 15px;
          background: rgba(255, 247, 217, 0.3);
          color: var(--text-dark);
          transition: all 0.3s ease;
        }

        form .data input:focus {
          border-color: var(--orange-primary);
          background: rgba(255, 255, 255, 0.9);
          box-shadow: 0 5px 20px rgba(255, 107, 53, 0.3);
          outline: none;
          transform: translateY(-2px);
        }

        .btn {
          margin: 30px 0 20px;
          height: 55px;
          width: 100%;
          border-radius: 15px;
          box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
          border: none;
          background: linear-gradient(135deg, var(--orange-primary), var(--orange-secondary));
          cursor: pointer;
          transition: all 0.3s ease;
          position: relative;
          overflow: hidden;
        }

        .btn::before {
          content: '';
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
          transition: 0.5s;
        }

        .btn:hover::before {
          left: 100%;
        }

        .btn:hover {
          transform: translateY(-3px);
          box-shadow: 0 12px 25px rgba(255, 107, 53, 0.4);
          background: linear-gradient(135deg, var(--orange-dark), var(--orange-primary));
        }

        .btn button {
          height: 100%;
          width: 100%;
          background: none;
          border: none;
          color: white;
          font-size: 17px;
          font-weight: 600;
          letter-spacing: 0.5px;
          cursor: pointer;
          transition: all 0.3s ease;
          text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .btn:hover button {
          color: #fff;
          transform: scale(1.02);
        }

        .login-link {
          text-align: center;
          margin-top: 25px;
          padding-top: 25px;
          border-top: 1px solid rgba(247, 196, 143, 0.3);
          color: var(--text-dark);
          font-size: 15px;
        }

        .login-link a {
          color: var(--orange-primary);
          text-decoration: none;
          font-weight: 600;
          transition: all 0.3s ease;
        }

        .login-link a:hover {
          color: var(--orange-dark);
          text-decoration: underline;
        }

        .error-message {
          color: #e74c3c;
          font-size: 14px;
          text-align: center;
          margin-top: 10px;
          padding: 10px;
          background: rgba(231, 76, 60, 0.1);
          border-radius: 10px;
          border: 1px solid rgba(231, 76, 60, 0.2);
          display: none;
        }

        .success-message {
          color: #27ae60;
          font-size: 14px;
          text-align: center;
          margin-top: 10px;
          padding: 10px;
          background: rgba(39, 174, 96, 0.1);
          border-radius: 10px;
          border: 1px solid rgba(39, 174, 96, 0.2);
          display: none;
        }

        @media (max-width: 768px) {
          .container {
            padding: 40px 30px;
            max-width: 400px;
          }
          
          .text {
            font-size: 34px;
          }
          
          .back-arrow {
            top: 15px;
            left: 15px;
            width: 35px;
            height: 35px;
            font-size: 18px;
          }
        }

        @media (max-width: 480px) {
          .container {
            padding: 35px 25px;
            margin: 15px;
          }
          
          .text {
            font-size: 30px;
          }
          
          form .data input {
            height: 50px;
            font-size: 15px;
          }
          
          .btn {
            height: 50px;
          }
          
          .back-arrow {
            top: 10px;
            left: 10px;
            width: 32px;
            height: 32px;
            font-size: 16px;
          }
        }
    </style>
</head>
<body>
    <div class="center">
        <div class="container">
            <a href="index.html" class="back-arrow">←</a>
            <div class="text">
                Администратор
            </div>
            <form id="adminForm">
                <div class="data">
                    <label for="login">Логин</label>
                    <input type="text" id="login" required>
                </div>
                <div class="data">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" required>
                </div>
                
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>
                
                <div class="btn">
                    <button type="submit">войти как администратор</button>
                </div>
                <div class="login-link">
                    Обычный вход? <a href="vxod.html">Войти</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000'; 

        document.getElementById('adminForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const login = document.getElementById('login').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Очищаем сообщения
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            try {
                // Используем специальный эндпоинт для входа администратора
                const response = await fetch(`${API_BASE_URL}/admins/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        login: login,
                        password: password
                    })
                });
                
                if (!response.ok) {
                    // Если статус 401 - неправильные учетные данные
                    if (response.status === 401) {
                        throw new Error('Неверный логин или пароль');
                    }
                    throw new Error('Ошибка подключения к серверу');
                }
                
                const result = await response.json();
                
                // Успешный вход
                successMessage.textContent = 'Успешный вход! Перенаправление...';
                successMessage.style.display = 'block';
                
                // Сохраняем данные в localStorage
                localStorage.setItem('admin', JSON.stringify({
                    login: result.login,
                    isAuthenticated: true
                }));
                
                // Перенаправляем на админскую страницу
                setTimeout(() => {
                    window.location.href = 'adminok.html';
                }, 1000);
                
            } catch (error) {
                console.error('Ошибка при входе:', error);
                errorMessage.textContent = error.message || 'Ошибка при подключении к серверу';
                errorMessage.style.display = 'block';
            }
        });

        // Функция для проверки авторизации администратора
        function checkAdminAuth() {
            const adminData = localStorage.getItem('admin');
            return adminData ? JSON.parse(adminData) : null;
        }

        // Функция для выхода администратора
        function adminLogout() {
            localStorage.removeItem('admin');
            window.location.href = 'index.html';
        }

        // Функция для получения администратора по логину
        async function getAdminByLogin(login) {
            try {
                const response = await fetch(`${API_BASE_URL}/admins/${login}`);
                if (!response.ok) {
                    throw new Error('Администратор не найден');
                }
                return await response.json();
            } catch (error) {
                console.error('Ошибка при получении данных администратора:', error);
                return null;
            }
        }

        // Функция для создания администратора
        async function createAdmin(adminData) {
            try {
                const response = await fetch(`${API_BASE_URL}/admins`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(adminData)
                });
                
                if (!response.ok) {
                    throw new Error('Ошибка при создании администратора');
                }
                
                return await response.json();
            } catch (error) {
                console.error('Ошибка при создании администратора:', error);
                throw error;
            }
        }

        // Функция для удаления администратора
        async function deleteAdmin(login) {
            try {
                const response = await fetch(`${API_BASE_URL}/admins/${login}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    throw new Error('Ошибка при удалении администратора');
                }
                
                return await response.json();
            } catch (error) {
                console.error('Ошибка при удалении администратора:', error);
                throw error;
            }
        }

        // Проверяем авторизацию при загрузке страницы
        document.addEventListener('DOMContentLoaded', function() {
            const admin = checkAdminAuth();
            if (admin && window.location.pathname.includes('adminok.html')) {
                // Можно выполнить дополнительные действия для авторизованного администратора
                console.log('Администратор авторизован:', admin.login);
            }
        });
    </script>
</body>
</html>
