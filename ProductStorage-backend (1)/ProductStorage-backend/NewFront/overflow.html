<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отстойник - StoreMarket</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFF7D9 0%, #F7C48F 100%);
            min-height: 100vh;
            color: #5a4a42;
        }

        .container {
            width: 100%;
            height: 80px;
            background: #F7C48F;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid rgba(222, 193, 150, 0.5);
            box-shadow: 0 2px 10px rgba(247, 196, 143, 0.3);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #5a4a42;
            text-decoration: none;
        }

        .admin-content {
            padding: 50px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .admin-title {
            font-size: 3rem;
            font-weight: 700;
            color: #5a4a42;
            margin-bottom: 15px;
        }

        .admin-subtitle {
            font-size: 1.2rem;
            color: #7a6a52;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .overflow-table-container {
            background: rgba(255, 253, 248, 0.95);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(247, 196, 143, 0.3);
            box-shadow: 0 5px 15px rgba(247, 196, 143, 0.2);
            margin-top: 30px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .table-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #5a4a42;
        }

        .add-to-overflow-btn {
            background: #F7C48F;
            color: #5a4a42;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(222, 193, 150, 0.5);
        }

        .add-to-overflow-btn:hover {
            background: #e8b47a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(247, 196, 143, 0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(247, 196, 143, 0.1);
        }

        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(247, 196, 143, 0.3);
        }

        th {
            background: #F7C48F;
            color: #5a4a42;
            font-weight: 600;
            font-size: 0.95rem;
        }

        tr:hover {
            background: rgba(247, 196, 143, 0.1);
        }

        .id-column {
            width: 80px;
            font-weight: 600;
            color: #7a6a52;
        }

        .product-id-column {
            width: 100px;
            font-weight: 600;
            color: #7a6a52;
        }

        .name-column {
            width: 250px;
            color: #5a4a42;
            font-weight: 600;
        }

        .quantity-column {
            width: 120px;
        }

        .unit-column {
            width: 80px;
            color: #7a6a52;
        }

        .date-column {
            width: 150px;
            color: #7a6a52;
        }

        .actions-column {
            width: 250px;
            text-align: center;
        }

        .action-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-move-to-shelf, .btn-edit, .btn-delete {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-move-to-shelf {
            background: #4CAF50;
            color: white;
        }

        .btn-move-to-shelf:hover {
            background: #45a049;
            transform: translateY(-1px);
        }

        .btn-edit {
            background: #3498db;
            color: white;
        }

        .btn-edit:hover {
            background: #2980b9;
            transform: translateY(-1px);
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .btn-delete:hover {
            background: #c0392b;
            transform: translateY(-1px);
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        .success-message {
            background: rgba(46, 204, 113, 0.2);
            color: #27ae60;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .error-message {
            background: rgba(231, 76, 60, 0.2);
            color: #c0392b;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #7a6a52;
            font-style: italic;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #5a4a42;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #7a6a52;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #5a4a42;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(247, 196, 143, 0.5);
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            color: #5a4a42;
            font-family: inherit;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #F7C48F;
            box-shadow: 0 0 0 2px rgba(247, 196, 143, 0.3);
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .submit-btn {
            background: #F7C48F;
            color: #5a4a42;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            border: 1px solid rgba(222, 193, 150, 0.5);
        }

        .submit-btn:hover {
            background: #e8b47a;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 1200px) {
            .admin-content {
                max-width: 100%;
                padding: 30px 15px;
            }
            
            table {
                display: block;
                overflow-x: auto;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            .table-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            th, td {
                padding: 10px 15px;
                font-size: 0.9rem;
            }

            .action-btns {
                flex-direction: column;
                gap: 5px;
            }

            .form-actions {
                flex-direction: column;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* Статусы */
        .overflow-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
        }

        .status-in-overflow {
            background: rgba(231, 76, 60, 0.2);
            color: #c0392b;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="adminok.html" class="logo">StoreMarket</a>
    </div>

    <main class="admin-content">
        <div class="admin-header">
            <h1 class="admin-title">Отстойник товаров</h1>
            <p class="admin-subtitle">Управление товарами, временно размещенными в отстойнике</p>
        </div>

        <!-- Сообщения -->
        <div id="messageContainer"></div>

        <div class="overflow-table-container">
            <div class="table-header">
                <h2 class="table-title">Товары в отстойнике</h2>
                <button class="add-to-overflow-btn" onclick="showAddToOverflowModal()">+ Добавить в отстойник</button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th class="id-column">ID</th>
                        <th class="product-id-column">ID товара</th>
                        <th class="name-column">Название товара</th>
                        <th class="quantity-column">Количество</th>
                        <th class="unit-column">Ед. изм.</th>
                        <th class="date-column">Дата добавления</th>
                        <th class="actions-column">Действия</th>
                    </tr>
                </thead>
                <tbody id="overflowTableBody">
                    <tr><td colspan="7" class="empty-message">Загрузка товаров из отстойника...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Модальное окно для добавления/редактирования товара в отстойнике -->
        <div class="modal" id="addToOverflowModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title" id="modalTitle">Добавить товар в отстойник</h2>
                    <button class="close-btn" onclick="closeAddToOverflowModal()">&times;</button>
                </div>
                
                <form id="addToOverflowForm">
                    <div class="form-group">
                        <label for="productSelect">Товар *</label>
                        <select id="productSelect" required>
                            <option value="">Выберите товар</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="overflowQuantity">Количество *</label>
                        <input type="number" id="overflowQuantity" min="1" required>
                        <div id="productInfo" style="margin-top: 5px; font-size: 0.9rem; color: #7a6a52;"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="overflowReason">Причина перемещения в отстойник</label>
                        <textarea id="overflowReason" rows="3" placeholder="Укажите причину перемещения товара в отстойник"></textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="submit-btn" id="submitBtn">Добавить в отстойник</button>
                        <button type="button" class="submit-btn" onclick="closeAddToOverflowModal()" style="background: #95a5a6;">Отмена</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Модальное окно для перемещения из отстойника на стеллаж -->
        <div class="modal" id="moveFromOverflowModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">Переместить на стеллаж</h2>
                    <button class="close-btn" onclick="closeMoveFromOverflowModal()">&times;</button>
                </div>
                
                <form id="moveFromOverflowForm">
                    <input type="hidden" id="overflowItemId">
                    
                    <div class="form-group">
                        <label>Текущий товар</label>
                        <div id="currentOverflowItem" class="form-text"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="moveToShelf">Выберите стеллаж *</label>
                        <select id="moveToShelf" required>
                            <option value="">Выберите стеллаж</option>
                        </select>
                        <div id="shelfCapacityInfo" style="margin-top: 5px; font-size: 0.9rem; color: #7a6a52;"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="moveQuantity">Количество для перемещения *</label>
                        <input type="number" id="moveQuantity" min="1" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="moveNotes">Примечания</label>
                        <textarea id="moveNotes" rows="3" placeholder="Дополнительная информация"></textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="submit-btn">Переместить на стеллаж</button>
                        <button type="button" class="submit-btn" onclick="closeMoveFromOverflowModal()" style="background: #95a5a6;">Отмена</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        let currentProducts = [];
        let currentOverflowItems = [];
        let currentShelves = [];
        let isEditMode = false;
        let currentEditId = null;

        // ==================== УТИЛИТЫ ====================

        // Универсальная функция для API запросов
        async function fetchAPI(endpoint, method = 'GET', data = null) {
            const url = `${API_BASE_URL}${endpoint}`;
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                }
            };
            
            if (data && (method === 'POST' || method === 'PUT' || method === 'PATCH')) {
                options.body = JSON.stringify(data);
            }
            
            try {
                const response = await fetch(url, options);
                
                if (response.status === 204) { // No Content
                    return null;
                }
                
                const responseData = await response.json();
                
                if (!response.ok) {
                    throw new Error(responseData.detail || `HTTP ${response.status}`);
                }
                
                return responseData;
            } catch (error) {
                console.error(`API Error [${method} ${endpoint}]:`, error);
                throw error;
            }
        }

        // Функция для показа сообщений
        function showMessage(text, type = 'info') {
            const container = document.getElementById('messageContainer');
            const message = document.createElement('div');
            message.className = `message ${type}-message`;
            message.textContent = text;
            
            container.innerHTML = '';
            container.appendChild(message);
            
            // Автоудаление через 5 секунд
            setTimeout(() => {
                if (message.parentNode === container) {
                    message.remove();
                }
            }, 5000);
        }

        // Форматирование даты
        function formatDate(dateString) {
            if (!dateString) return '-';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('ru-RU');
            } catch (e) {
                return dateString;
            }
        }

        // ==================== ЗАГРУЗКА ДАННЫХ ====================

        // Загрузка товаров
        async function loadProducts() {
            try {
                const products = await fetchAPI('/products');
                currentProducts = products || [];
                return products;
            } catch (error) {
                console.error('Load products error:', error);
                return [];
            }
        }

        // Загрузка товаров из отстойника
        async function loadOverflowItems() {
            try {
                const overflowItems = await fetchAPI('/overflow-bins');
                currentOverflowItems = overflowItems || [];
                renderOverflowTable(overflowItems);
                return overflowItems;
            } catch (error) {
                console.error('Load overflow items error:', error);
                showMessage('Ошибка загрузки товаров из отстойника', 'error');
                return [];
            }
        }

        // Загрузка стеллажей
        async function loadShelves() {
            try {
                const shelves = await fetchAPI('/shelves');
                currentShelves = shelves || [];
                return shelves;
            } catch (error) {
                console.error('Load shelves error:', error);
                return [];
            }
        }

        // ==================== ОТОБРАЖЕНИЕ ТАБЛИЦЫ ====================

        // Отображение таблицы отстойника
        function renderOverflowTable(overflowItems) {
            const tbody = document.getElementById('overflowTableBody');
            if (!tbody) {
                console.error('Element #overflowTableBody not found');
                return;
            }
            
            if (!overflowItems || overflowItems.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-message">Товары в отстойнике не найдены</td></tr>';
                return;
            }

            tbody.innerHTML = overflowItems.map(item => {
                const product = currentProducts.find(p => p.id === item.product_id);
                
                return `
                <tr>
                    <td class="id-column">${item.id}</td>
                    <td class="product-id-column">${item.product_id}</td>
                    <td class="name-column">
                        <strong>${product?.name || 'Неизвестный товар'}</strong><br>
                        <small>${product?.description || ''}</small>
                    </td>
                    <td class="quantity-column">
                        ${item.quantity}
                    </td>
                    <td class="unit-column">
                        ${product?.unit || 'шт'}
                    </td>
                    <td class="date-column">
                        ${formatDate(item.date_added)}
                    </td>
                    <td class="actions-column">
                        <div class="action-btns">
                            <button class="btn-move-to-shelf" onclick="moveFromOverflow(${item.id})">На стеллаж</button>
                            <button class="btn-edit" onclick="editOverflowItem(${item.id})">Изменить</button>
                            <button class="btn-delete" onclick="deleteFromOverflow(${item.id})">Удалить</button>
                        </div>
                    </td>
                </tr>
                `;
            }).join('');
        }

        // ==================== ФУНКЦИИ ДЛЯ КНОПОК ====================

        // Показать модальное окно добавления в отстойник
        async function showAddToOverflowModal() {
            isEditMode = false;
            currentEditId = null;
            
            await loadProductsForSelect();
            
            // Сброс формы и включение полей
            document.getElementById('addToOverflowForm').reset();
            document.getElementById('productSelect').disabled = false;
            document.getElementById('overflowQuantity').disabled = false;
            document.getElementById('productInfo').innerHTML = '';
            document.getElementById('modalTitle').textContent = 'Добавить товар в отстойник';
            document.getElementById('submitBtn').textContent = 'Добавить в отстойник';
            
            document.getElementById('addToOverflowModal').style.display = 'flex';
        }

        // Редактировать элемент отстойника
        async function editOverflowItem(overflowId) {
            const item = currentOverflowItems.find(i => i.id === overflowId);
            if (!item) {
                showMessage('Элемент отстойника не найден', 'error');
                return;
            }
            
            isEditMode = true;
            currentEditId = overflowId;
            
            // Загружаем товары для выбора
            await loadProductsForSelect();
            
            // Устанавливаем значения из элемента
            document.getElementById('productSelect').value = item.product_id;
            document.getElementById('overflowQuantity').value = item.quantity;
            document.getElementById('overflowReason').value = item.notes || '';
            
            // Блокируем выбор товара при редактировании
            document.getElementById('productSelect').disabled = true;
            
            // Показываем информацию о товаре
            const product = currentProducts.find(p => p.id === item.product_id);
            if (product) {
                const totalAvailable = product.current_quantity + item.quantity;
                document.getElementById('productInfo').innerHTML = 
                    `Текущее количество в отстойнике: ${item.quantity}<br>
                     Доступно на складе: ${product.current_quantity} ${product.unit}<br>
                     Всего доступно: ${totalAvailable} ${product.unit}`;
            }
            
            // Меняем заголовок и текст кнопки
            document.getElementById('modalTitle').textContent = 'Редактировать товар в отстойнике';
            document.getElementById('submitBtn').textContent = 'Сохранить изменения';
            
            document.getElementById('addToOverflowModal').style.display = 'flex';
        }

        // Закрыть модальное окно добавления/редактирования
        function closeAddToOverflowModal() {
            document.getElementById('addToOverflowModal').style.display = 'none';
            document.getElementById('addToOverflowForm').reset();
            document.getElementById('productInfo').innerHTML = '';
            document.getElementById('productSelect').disabled = false;
            document.getElementById('overflowQuantity').disabled = false;
            
            isEditMode = false;
            currentEditId = null;
        }

        // Переместить из отстойника на стеллаж
        async function moveFromOverflow(overflowId) {
            const item = currentOverflowItems.find(i => i.id === overflowId);
            if (!item) {
                showMessage('Элемент отстойника не найден', 'error');
                return;
            }
            
            const product = currentProducts.find(p => p.id === item.product_id);
            document.getElementById('overflowItemId').value = overflowId;
            document.getElementById('currentOverflowItem').innerHTML = 
                `<strong>${product?.name || 'Неизвестный товар'}</strong><br>
                 Текущее количество: ${item.quantity} ${product?.unit || 'шт'}`;
            
            document.getElementById('moveQuantity').value = item.quantity;
            document.getElementById('moveQuantity').max = item.quantity;
            document.getElementById('moveQuantity').min = 1;
            
            // Загружаем стеллажи для выбора
            await loadShelvesForMovement();
            
            document.getElementById('moveFromOverflowModal').style.display = 'flex';
        }

        // Закрыть модальное окно перемещения из отстойника
        function closeMoveFromOverflowModal() {
            document.getElementById('moveFromOverflowModal').style.display = 'none';
            document.getElementById('moveFromOverflowForm').reset();
        }

        // Удалить из отстойника
        async function deleteFromOverflow(overflowId) {
            const item = currentOverflowItems.find(i => i.id === overflowId);
            if (!item) {
                showMessage('Элемент отстойника не найден', 'error');
                return;
            }
            
            const product = currentProducts.find(p => p.id === item.product_id);
            const confirmed = confirm(`Вы уверены, что хотите удалить "${product?.name || 'товар'}" из отстойника?\n\nКоличество: ${item.quantity} ${product?.unit || 'шт'}\n\nПримечание: Товар вернется на склад.`);
            
            if (!confirmed) return;
            
            try {
                await fetchAPI(`/overflow-bins/${overflowId}`, 'DELETE');
                showMessage('Товар удален из отстойника и возвращен на склад', 'success');
                await loadOverflowItems();
                await loadProducts(); // Обновляем список товаров
            } catch (error) {
                showMessage(`Ошибка удаления: ${error.message}`, 'error');
            }
        }

        // ==================== РАБОТА С ФОРМАМИ ====================

        // Загрузка товаров для выпадающего списка
        async function loadProductsForSelect() {
            const select = document.getElementById('productSelect');
            select.innerHTML = '<option value="">Выберите товар</option>';
            
            currentProducts.forEach(product => {
                const option = document.createElement('option');
                option.value = product.id;
                option.textContent = `${product.name} (доступно: ${product.current_quantity} ${product.unit})`;
                select.appendChild(option);
            });
            
            // Добавляем обработчик изменения для обновления информации
            select.addEventListener('change', updateProductInfo);
        }

        // Обновление информации о товаре при выборе
        function updateProductInfo() {
            const productId = document.getElementById('productSelect').value;
            const product = currentProducts.find(p => p.id == productId);
            
            if (product) {
                let infoText = `Доступно на складе: ${product.current_quantity} ${product.unit}`;
                
                // Если в режиме редактирования, показываем дополнительную информацию
                if (isEditMode && currentEditId) {
                    const item = currentOverflowItems.find(i => i.id == currentEditId);
                    if (item && item.product_id == productId) {
                        const totalAvailable = product.current_quantity + item.quantity;
                        infoText = `Текущее количество в отстойнике: ${item.quantity}<br>
                                    Доступно на складе: ${product.current_quantity} ${product.unit}<br>
                                    Всего доступно: ${totalAvailable} ${product.unit}`;
                    }
                }
                
                document.getElementById('productInfo').innerHTML = infoText;
                document.getElementById('overflowQuantity').max = product.current_quantity + (isEditMode ? item?.quantity || 0 : 0);
            } else {
                document.getElementById('productInfo').innerHTML = '';
            }
        }

        // Загрузка стеллажей для перемещения
        async function loadShelvesForMovement() {
            const select = document.getElementById('moveToShelf');
            select.innerHTML = '<option value="">Выберите стеллаж</option>';
            
            currentShelves.forEach(shelf => {
                const freeSpace = shelf.max_capacity - shelf.current_quantity;
                if (freeSpace > 0) {
                    const option = document.createElement('option');
                    option.value = shelf.id;
                    option.textContent = `${shelf.name} (свободно: ${freeSpace})`;
                    select.appendChild(option);
                }
            });
            
            // Обновляем информацию о вместимости при изменении выбора
            select.addEventListener('change', function() {
                const shelf = currentShelves.find(s => s.id == this.value);
                if (shelf) {
                    const freeSpace = shelf.max_capacity - shelf.current_quantity;
                    document.getElementById('shelfCapacityInfo').innerHTML = 
                        `Свободно мест: ${freeSpace}`;
                } else {
                    document.getElementById('shelfCapacityInfo').innerHTML = '';
                }
            });
        }

        // Обработка добавления/редактирования в отстойник
        async function handleAddToOverflow(e) {
            e.preventDefault();
            
            const productId = document.getElementById('productSelect').value;
            const quantity = parseInt(document.getElementById('overflowQuantity').value);
            const reason = document.getElementById('overflowReason').value;
            
            if (!productId || !quantity || quantity <= 0) {
                showMessage('Заполните все обязательные поля корректно', 'error');
                return;
            }
            
            const product = currentProducts.find(p => p.id == productId);
            if (!product) {
                showMessage('Товар не найден', 'error');
                return;
            }
            
            if (isEditMode && currentEditId) {
                // Режим редактирования
                await handleEditOverflow(productId, quantity, reason, product);
            } else {
                // Режим добавления
                await handleCreateOverflow(productId, quantity, reason, product);
            }
        }

        // Обработка создания нового элемента отстойника
        async function handleCreateOverflow(productId, quantity, reason, product) {
            if (quantity > product.current_quantity) {
                showMessage(`Превышает доступное количество (${product.current_quantity})`, 'error');
                return;
            }
            
            try {
                const overflowData = {
                    product_id: parseInt(productId),
                    quantity: quantity,
                    notes: reason || null
                };
                
                await fetchAPI('/overflow-bins', 'POST', overflowData);
                showMessage('Товар добавлен в отстойник', 'success');
                closeAddToOverflowModal();
                
                await Promise.all([
                    loadOverflowItems(),
                    loadProducts()
                ]);
                
            } catch (error) {
                showMessage(`Ошибка добавления: ${error.message}`, 'error');
            }
        }

        // Обработка редактирования существующего элемента отстойника
async function handleEditOverflow(productId, quantity, reason, product) {
    const item = currentOverflowItems.find(i => i.id == currentEditId);
    if (!item) {
        showMessage('Элемент для редактирования не найден', 'error');
        return;
    }

    const totalAvailable = product.current_quantity + item.quantity;
    if (quantity > totalAvailable) {
        showMessage(`Недостаточно товара. Максимально доступно: ${totalAvailable}`, 'error');
        return;
    }

    try {
        const updateData = {
            product_id: parseInt(productId),   // обязательно
            quantity: quantity,
            notes: reason || null
        };

        await fetchAPI(`/overflow-bins/${currentEditId}`, 'PUT', updateData);
        showMessage('Товар обновлен в отстойнике', 'success');
        closeAddToOverflowModal();

        await Promise.all([
            loadOverflowItems(),
            loadProducts()
        ]);
    } catch (error) {
        showMessage(`Ошибка редактирования: ${error.message}`, 'error');
    }
}

// Обработка перемещения из отстойника на стеллаж
async function handleMoveFromOverflow(e) {
    e.preventDefault();

    const overflowId = document.getElementById('overflowItemId').value;
    const shelfId = document.getElementById('moveToShelf').value;
    const quantity = parseInt(document.getElementById('moveQuantity').value);
    const notes = document.getElementById('moveNotes').value;

    const item = currentOverflowItems.find(i => i.id == overflowId);
    if (!item) {
        showMessage('Элемент отстойника не найден', 'error');
        return;
    }

    if (!shelfId || !quantity || quantity <= 0) {
        showMessage('Заполните все обязательные поля', 'error');
        return;
    }

    if (quantity > item.quantity) {
        showMessage(`Нельзя переместить больше чем есть в отстойнике (${item.quantity})`, 'error');
        return;
    }

    const shelf = currentShelves.find(s => s.id == shelfId);
    if (!shelf) {
        showMessage('Выбранный стеллаж не найден', 'error');
        return;
    }

    const freeSpace = shelf.max_capacity - shelf.current_quantity;
    if (quantity > freeSpace) {
        showMessage(`Недостаточно места на стеллаже. Свободно: ${freeSpace}`, 'error');
        return;
    }

    try {
        // Создаем размещение на стеллаже
        const placementData = {
            product_id: item.product_id,
            shelf_id: parseInt(shelfId),
            quantity: quantity,
            notes: notes || `Перемещено из отстойника (ID: ${overflowId})`
        };
        await fetchAPI('/product-placements', 'POST', placementData);

        if (quantity < item.quantity) {
            // Обновляем отстойник — обязательно передаем product_id
            const updateData = {
                product_id: item.product_id,
                quantity: item.quantity - quantity,
                notes: item.notes || null
            };
            await fetchAPI(`/overflow-bins/${overflowId}`, 'PUT', updateData);
            showMessage(`Товар частично перемещен на стеллаж (${quantity} из ${item.quantity})`, 'success');
        } else {
            await fetchAPI(`/overflow-bins/${overflowId}`, 'DELETE');
            showMessage('Товар полностью перемещен на стеллаж', 'success');
        }

        closeMoveFromOverflowModal();

        await Promise.all([
            loadOverflowItems(),
            loadProducts(),
            loadShelves()
        ]);
    } catch (error) {
        showMessage(`Ошибка перемещения: ${error.message}`, 'error');
    }
}


        // ==================== ИНИЦИАЛИЗАЦИЯ ====================

        // Настройка обработчиков событий
        function setupEventListeners() {
            document.getElementById('addToOverflowForm').addEventListener('submit', handleAddToOverflow);
            document.getElementById('moveFromOverflowForm').addEventListener('submit', handleMoveFromOverflow);
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('DOM Content Loaded - Страница отстойника');
            
            // Загружаем все данные параллельно
            await Promise.all([
                loadProducts(),
                loadOverflowItems(),
                loadShelves()
            ]);
            
            setupEventListeners();
            
            showMessage('Отстойник товаров загружен', 'success');
        });
    </script>
</body>
</html>
